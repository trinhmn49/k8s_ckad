# Lab 1.4 — Label & Annotation Drill
# Duration: ~30 min | CKAD domain: Application Design and Build (20%)
# Bulk-create Pods and update labels across many objects
# Query resources with label selectors
# Use --overwrite for label changes

# ============================================================================
# DETAILED EXPLANATION
# ============================================================================
#
# LABELS vs ANNOTATIONS
#
# 1. LABELS
#    - Key/value pairs used to IDENTIFY and SELECT objects
#    - Consumed by selectors (Services, Deployments, NetworkPolicies, kubectl -l)
#    - Small, indexed, queryable - keep them short and structured
#    - Use case: app=web, tier=frontend, env=prod, version=v2
#
# 2. ANNOTATIONS
#    - Key/value pairs used to attach ARBITRARY METADATA
#    - NOT used by selectors - purely informational / tooling metadata
#    - Can hold larger values (build info, changelogs, tool config)
#    - Use case: kubectl.kubernetes.io/last-applied-configuration, changelog notes
#
# WHY --overwrite MATTERS:
#    - kubectl label fails with an error if the key already exists on the object
#    - This is a safety guard against accidental relabeling
#    - Pass --overwrite to explicitly confirm replacing an existing label's value
#
# LABEL SELECTORS:
#    - Equality-based: -l env=prod              (env must equal prod)
#    - Inequality-based: -l env!=prod            (env must not equal prod)
#    - Set-based: -l 'env in (prod,staging)'     (env is one of these)
#    - Set-based: -l 'env notin (dev)'           (env is not this)
#    - Existence: -l tier                        (tier key exists, any value)
#    - Non-existence: -l '!tier'                 (tier key does NOT exist)
#    - Combine with commas (AND logic): -l 'env=prod,tier=frontend'
#
# ============================================================================

# ============================================================================
# STEP 1: Bulk-create Pods imperatively (loop, since kubectl has no native bulk-create)
# ============================================================================

# Create 5 Pods with a shared base label but distinct names/tiers:
kubectl run pod-1 --image=busybox:musl --labels="app=drill,tier=frontend" -- sleep 3600
kubectl run pod-2 --image=busybox:musl --labels="app=drill,tier=frontend" -- sleep 3600
kubectl run pod-3 --image=busybox:musl --labels="app=drill,tier=backend"  -- sleep 3600
kubectl run pod-4 --image=busybox:musl --labels="app=drill,tier=backend"  -- sleep 3600
kubectl run pod-5 --image=busybox:musl --labels="app=drill,tier=cache"    -- sleep 3600

# Faster alternative using a shell loop:
# for i in 1 2 3 4 5; do
#   kubectl run pod-$i --image=busybox:musl --labels="app=drill" -- sleep 3600
# done

# ============================================================================
# STEP 2: Exported Pod manifest (reference shape - what each Pod looks like)
# ============================================================================
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-1
  labels:
    app: drill
    tier: frontend
spec:
  containers:
  - name: pod-1
    image: busybox:musl
    command: ["sleep", "3600"]
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  restartPolicy: Always

# ============================================================================
# STEP 3: Query resources with label selectors
# ============================================================================

# List all Pods with their labels shown:
kubectl get pods --show-labels

# Equality selector - only frontend tier:
kubectl get pods -l tier=frontend

# Inequality selector - everything except backend:
kubectl get pods -l tier!=backend

# Set-based selector - frontend OR cache:
kubectl get pods -l 'tier in (frontend,cache)'

# Combined AND selector - app=drill AND tier=backend:
kubectl get pods -l 'app=drill,tier=backend'

# Existence selector - any Pod that HAS a tier label:
kubectl get pods -l tier

# Use selector output as input to another command (common exam pattern):
kubectl get pods -l tier=backend -o name

# ============================================================================
# STEP 4: Update labels across many objects with --overwrite
# ============================================================================

# Attempt to change tier on pod-1 WITHOUT --overwrite (this will FAIL):
kubectl label pod pod-1 tier=edge
# Error: 'tier' already has a value, must use --overwrite

# Correct way - force the overwrite:
kubectl label pod pod-1 tier=edge --overwrite

# Bulk-update ALL Pods matching a selector at once (no loop needed):
kubectl label pods -l app=drill env=lab --overwrite

# Bulk-update using --all (every Pod in the namespace):
kubectl label pods --all env=lab --overwrite

# Add a NEW label (no --overwrite needed since key doesn't exist yet):
kubectl label pods -l app=drill owner=student

# Remove a label entirely (trailing dash):
kubectl label pods -l app=drill owner-

# ============================================================================
# STEP 5: Annotations (contrast with labels)
# ============================================================================

# Add an annotation (works the same way, also needs --overwrite to replace):
kubectl annotate pods -l app=drill note="created for label drill" --overwrite

# View annotations:
kubectl get pod pod-1 -o jsonpath='{.metadata.annotations}'

# Confirm annotations are NOT selectable (this returns nothing / errors):
kubectl get pods -l note="created for label drill"

# ============================================================================
# STEP 6: Verification commands
# ============================================================================

# Confirm final label state across all Pods:
kubectl get pods --show-labels

# Verify a specific label value via jsonpath:
kubectl get pod pod-1 -o jsonpath='{.metadata.labels.tier}'

# Count Pods matching a selector (exam speed trick):
kubectl get pods -l env=lab --no-headers | wc -l

# ============================================================================
# CLEANUP
# ============================================================================
kubectl delete pods pod-1 pod-2 pod-3 pod-4 pod-5 --ignore-not-found

# ============================================================================
# KEY CONCEPTS FOR CKAD EXAM
# ============================================================================
#
# 1. LABEL COMMAND SYNTAX:
#    - kubectl label <type> <name> key=value            (single object)
#    - kubectl label <type> -l <selector> key=value      (bulk, by selector)
#    - kubectl label <type> --all key=value               (bulk, everything)
#    - kubectl label <type> <name> key=value --overwrite  (replace existing)
#    - kubectl label <type> <name> key-                   (remove label)
#
# 2. SELECTOR SYNTAX CHEAT SHEET:
#    - key=value          equality
#    - key!=value         inequality
#    - key                existence
#    - !key               non-existence
#    - 'key in (a,b)'     set membership
#    - 'key notin (a,b)'  set exclusion
#    - comma-separated = AND (no OR across different keys)
#
# 3. LABELS ARE FUNCTIONAL, ANNOTATIONS ARE INFORMATIONAL:
#    - Services/Deployments/NetworkPolicies SELECT via labels only
#    - Annotations can never be used in a selector
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# If "kubectl label" errors with "already has a value":
# - Add --overwrite to confirm the intentional change
#
# If a selector returns no results:
# - Check exact key/value with: kubectl get pods --show-labels
# - Remember selectors are case-sensitive
# - Quote set-based selectors to avoid shell parsing issues: -l 'tier in (a,b)'
#
# If bulk label update only changed one object:
# - Confirm you used -l <selector> or --all, not a single object name
#
# ============================================================================
# EXAM TIPS:
# - kubectl get pods --show-labels is the fastest way to audit current labels
# - Combine selector + -o name to feed results into follow-up commands
# - Trailing dash (key-) removes a label/annotation - easy to miss under time pressure
# - --overwrite is required any time the key already exists, even bulk updates
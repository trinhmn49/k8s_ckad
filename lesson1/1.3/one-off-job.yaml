apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: weather-alert
spec:
  backoffLimit: 3          # Retry up to 3 times on failure before giving up
  template:
    spec:
      containers:
      - name: db-migrate
        image: postgres:15-alpine   # the project's own Postgres client, not busybox
        command:
        - /bin/sh
        - -c
        - |
          echo "Applying schema (idempotent - CREATE TABLE IF NOT EXISTS)..."
          psql "postgresql://weather_app:weather_app@postgres:5432/weather_alert" -f /migrations/schema.sql
          echo "Schema apply complete"
        volumeMounts:
        - name: schema-vol
          mountPath: /migrations
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: schema-vol
        configMap:
          name: postgres-init-schema   # same ConfigMap already used to bootstrap postgres
      restartPolicy: Never   # Never or OnFailure required for Jobs
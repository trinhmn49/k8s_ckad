# Lab 1.3 — Jobs & CronJobs
# Duration: ~45 min | CKAD domain: Application Design and Build (20%)
# Run a one-off Job to completion with backoffLimit
# Create a CronJob that spawns Jobs on a schedule
# Distinguish Job/CronJob from Deployment

# ============================================================================
# DETAILED EXPLANATION
# ============================================================================
#
# JOB vs CRONJOB vs DEPLOYMENT
#
# 1. DEPLOYMENT
#    - Manages Pods meant to run FOREVER (restartPolicy: Always)
#    - If a Pod dies, the ReplicaSet replaces it immediately
#    - Scales via .spec.replicas
#    - Use case: web servers, APIs, anything long-running
#
# 2. JOB
#    - Manages Pods meant to run ONCE TO COMPLETION (restartPolicy: Never or OnFailure)
#    - Pod exits 0  -> Job marked Complete, no more Pods created
#    - Pod exits !=0 -> Job retries, up to .spec.backoffLimit times, then Failed
#    - Use case: batch processing, migrations, one-off scripts
#
# 3. CRONJOB
#    - A CronJob does NOT run Pods directly - it creates a new Job on a schedule
#    - .spec.schedule uses standard cron syntax (5 fields: min hour dom month dow)
#    - Each scheduled tick -> CronJob controller creates a fresh Job object
#    - Use case: nightly backups, periodic cleanup, scheduled reports
#
# BACKOFF LIMIT MECHANICS:
#    - .spec.backoffLimit (default 6) caps retry attempts on Pod failure
#    - Each failed attempt creates a NEW Pod (not a container restart)
#    - Delay between retries grows exponentially (10s, 20s, 40s... capped at 6min)
#    - Once exceeded, Job condition becomes "Failed" with reason "BackoffLimitExceeded"
#
# ============================================================================

# ============================================================================
# PART A: ONE-OFF JOB (with backoffLimit)
# ============================================================================

# STEP 1: Create the Job imperatively
# Command to run:
kubectl create job data-processor \
  --image=busybox:musl \
  -- /bin/sh -c "echo 'Processing data...'; sleep 5; echo 'Done'"

# ============================================================================
# STEP 2: Export the Job manifest (dry-run for reference)
kubectl create job data-processor \
  --image=busybox:musl \
  --dry-run=client -o yaml \
  -- /bin/sh -c "echo 'Processing data...'; sleep 5; echo 'Done'"

# ============================================================================
# STEP 3: Exported Job Manifest (with backoffLimit added manually)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: data-processor
spec:
  backoffLimit: 3          # Retry up to 3 times on failure before giving up
  template:
    spec:
      containers:
      - name: data-processor
        image: busybox:musl
        command:
        - /bin/sh
        - -c
        - |
          echo "Processing data..."
          sleep 5
          echo "Done"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      restartPolicy: Never   # Never or OnFailure required for Jobs

# ============================================================================
# STEP 4 (OPTIONAL): A FAILING job to observe backoffLimit exhaustion
---
apiVersion: batch/v1
kind: Job
metadata:
  name: always-fails
spec:
  backoffLimit: 2           # Only 2 retries -> fails fast for demo purposes
  template:
    spec:
      containers:
      - name: always-fails
        image: busybox:musl
        command: ["/bin/sh", "-c", "echo 'about to fail'; exit 1"]
      restartPolicy: Never

# ============================================================================
# STEP 5: Verification commands

# Watch Job progress:
kubectl get job data-processor -w

# Check Job status (succeeded/failed counts):
kubectl describe job data-processor

# View logs from the Job's Pod:
kubectl logs job/data-processor

# Confirm Job completed successfully:
kubectl get job data-processor -o jsonpath='{.status.succeeded}'

# Watch the failing Job exhaust its backoffLimit:
kubectl get job always-fails -w
kubectl describe job always-fails
# Look for: Events -> "BackoffLimitExceeded"

# ============================================================================
# PART B: CRONJOB
# ============================================================================

# STEP 1: Create the CronJob imperatively (runs every minute)
kubectl create cronjob report-generator \
  --image=busybox:musl \
  --schedule="*/1 * * * *" \
  -- /bin/sh -c "date; echo 'Generating report...'"

# ============================================================================
# STEP 2: Export the CronJob manifest (dry-run for reference)
kubectl create cronjob report-generator \
  --image=busybox:musl \
  --schedule="*/1 * * * *" \
  --dry-run=client -o yaml \
  -- /bin/sh -c "date; echo 'Generating report...'"

# ============================================================================
# STEP 3: Exported CronJob Manifest (with history limits + backoffLimit added)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: report-generator
spec:
  schedule: "*/1 * * * *"       # Every minute (min hour dom month dow)
  concurrencyPolicy: Forbid     # Skip new run if previous still active
  successfulJobsHistoryLimit: 3 # Keep last 3 successful Jobs
  failedJobsHistoryLimit: 1     # Keep last 1 failed Job
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          containers:
          - name: report-generator
            image: busybox:musl
            command:
            - /bin/sh
            - -c
            - |
              date
              echo "Generating report..."
          restartPolicy: OnFailure

# ============================================================================
# STEP 4: Verification commands

# List CronJobs (shows schedule, last-schedule time, active count):
kubectl get cronjobs

# Watch new Jobs get created each minute:
kubectl get jobs --watch

# Describe the CronJob (shows last schedule/active Jobs):
kubectl describe cronjob report-generator

# View logs of the most recent Job spawned by the CronJob:
kubectl logs -l job-name=$(kubectl get jobs \
  --sort-by=.status.startTime \
  -o jsonpath='{.items[-1:].metadata.name}')

# Manually trigger a CronJob run immediately (doesn't wait for schedule):
kubectl create job manual-run --from=cronjob/report-generator

# ============================================================================
# CLEANUP
# ============================================================================
kubectl delete job data-processor always-fails manual-run --ignore-not-found
kubectl delete cronjob report-generator --ignore-not-found

# ============================================================================
# KEY CONCEPTS FOR CKAD EXAM
# ============================================================================
#
# 1. JOB FIELDS:
#    - spec.backoffLimit    -> retry cap on Pod failure (default 6)
#    - spec.completions     -> total successful Pod completions needed
#    - spec.parallelism     -> how many Pods run at once
#    - spec.activeDeadlineSeconds -> hard timeout for the whole Job
#
# 2. CRONJOB FIELDS:
#    - spec.schedule                -> cron expression (5 fields)
#    - spec.concurrencyPolicy        -> Allow | Forbid | Replace
#    - spec.successfulJobsHistoryLimit / failedJobsHistoryLimit -> cleanup old Jobs
#    - spec.jobTemplate              -> the Job spec created on each tick
#
# 3. RESTART POLICY RULES:
#    - Deployment Pods: restartPolicy: Always (only valid option)
#    - Job/CronJob Pods: restartPolicy: Never or OnFailure (Always is invalid)
#
# 4. QUICK IMPERATIVE COMMANDS:
#    - kubectl create job <name> --image=<image> -- <command>
#    - kubectl create cronjob <name> --image=<image> --schedule="<cron>" -- <command>
#    - kubectl create job <name> --from=cronjob/<cronjob-name>  (manual trigger)
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# If Job stuck with 0/1 completions:
# - kubectl describe job <name>        (check Events for image pull / scheduling errors)
# - kubectl logs job/<name>            (check application-level failure)
#
# If Job shows "BackoffLimitExceeded":
# - Container is exiting non-zero every attempt
# - Fix the command/image, or the failure is expected (check backoffLimit is intentional)
#
# If CronJob never creates Jobs:
# - Verify schedule syntax: kubectl get cronjob <name> -o yaml | grep schedule
# - Check concurrencyPolicy: Forbid + a stuck previous Job blocks new runs
# - Check cluster time / CronJob controller is running (kube-controller-manager)
#
# If old Jobs pile up:
# - Tune successfulJobsHistoryLimit / failedJobsHistoryLimit lower
#
# ============================================================================
# EXAM TIPS:
# - kubectl create job / kubectl create cronjob are faster than writing YAML by hand
# - Use --dry-run=client -o yaml to generate a base manifest, then edit backoffLimit etc.
# - "Run to completion" = Job; "on a schedule" = CronJob; "always running" = Deployment
# - restartPolicy: Always is INVALID for Job/CronJob Pod templates - exam gotcha
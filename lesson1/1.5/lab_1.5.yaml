# Lab 1.5 — ConfigMaps & Secrets (using the weather-alert project)
# Duration: ~45 min | CKAD domain: Application Environment, Configuration and Security (25%)
# Inspect and update ConfigMaps/Secrets already backing a real running app
# Understand why editing a ConfigMap does NOT restart Pods automatically
# Create ConfigMaps/Secrets imperatively (exam speed path)
# Distinguish env-var injection from volume-mounted config

# ============================================================================
# PREREQUISITE
# ============================================================================
# This lab runs against the weather-alert microservices project in this repo,
# already deployed to minikube under the "weather-alert" namespace:
#   kubectl apply -f ../../weather-alert/k8s/namespace.yaml
#   kubectl apply -f ../../weather-alert/k8s/configmaps/
#   kubectl apply -f ../../weather-alert/k8s/secrets/
#   kubectl apply -f ../../weather-alert/k8s/backing-services/
#   kubectl apply -f ../../weather-alert/k8s/deployments/
# Verify first:
#   kubectl -n weather-alert get pods
# All Pods should be Running before starting this lab.

# ============================================================================
# DETAILED EXPLANATION
# ============================================================================
#
# CONFIGMAP vs SECRET
#
# 1. CONFIGMAP
#    - Non-sensitive key/value configuration (log levels, hostnames, URLs)
#    - Stored in plaintext in etcd
#    - Injected via envFrom, individual env.valueFrom, or mounted as files
#
# 2. SECRET
#    - Sensitive values (passwords, API keys, tokens)
#    - Stored base64-ENCODED (NOT encrypted) in etcd by default
#    - Base64 is an ENCODING, not encryption - anyone with etcd/API access can decode it
#    - For real encryption at rest, cluster admin must enable EncryptionConfiguration
#    - Same injection mechanisms as ConfigMap (envFrom, valueFrom, volume mount)
#
# WHY THE DISTINCTION MATTERS ON THE EXAM:
#    - Secrets get lightly different RBAC treatment and are hidden from `kubectl get secret -o yaml`
#      only in the sense that `kubectl describe secret` hides values; `-o yaml` still shows base64
#    - Both are namespaced objects - must exist in the same namespace as the Pod using them
#
# CRITICAL GOTCHA: EDITING A CONFIGMAP DOES NOT RESTART PODS
#    - Env vars are injected ONCE at container start (like a snapshot)
#    - Editing the ConfigMap/Secret object does NOT update already-running containers' env
#    - Volume-mounted ConfigMaps/Secrets DO update the mounted file eventually (kubelet sync,
#      ~1 min delay) but the app must re-read the file itself - nothing restarts it for you
#    - To pick up new values via env vars, you MUST restart the Pods:
#        kubectl rollout restart deployment/<name>
#
# ============================================================================

# ============================================================================
# STEP 1: Inspect the ConfigMap and Secret already backing the app
# ============================================================================

# View the ConfigMap (plaintext values):
kubectl -n weather-alert get configmap app-config -o yaml

# View the Secret (base64-ENCODED, not encrypted):
kubectl -n weather-alert get secret app-secrets -o yaml

# Decode a specific secret value:
kubectl -n weather-alert get secret app-secrets -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
echo   # newline for readability

# Confirm a running Pod actually has these values injected:
kubectl -n weather-alert exec deploy/user-service -- printenv | grep -E "LOG_LEVEL|DB_HOST|DB_USER"

# ============================================================================
# STEP 2: Prove the "editing doesn't restart Pods" gotcha
# ============================================================================

# Note current LOG_LEVEL:
kubectl -n weather-alert exec deploy/weather-fetcher -- printenv LOG_LEVEL
# -> info

# Patch the ConfigMap (no editor needed - exam speed path):
kubectl -n weather-alert patch configmap app-config --type merge -p '{"data":{"LOG_LEVEL":"debug"}}'

# Check the ConfigMap object itself - it's updated:
kubectl -n weather-alert get configmap app-config -o jsonpath='{.data.LOG_LEVEL}'
# -> debug

# But the RUNNING Pod still has the OLD value (env vars are a startup-time snapshot):
kubectl -n weather-alert exec deploy/weather-fetcher -- printenv LOG_LEVEL
# -> info   (unchanged!)

# Only a rollout restart picks up the new value:
kubectl -n weather-alert rollout restart deployment/weather-fetcher
kubectl -n weather-alert rollout status deployment/weather-fetcher

# Now the new Pod has the updated value:
kubectl -n weather-alert exec deploy/weather-fetcher -- printenv LOG_LEVEL
# -> debug

# ============================================================================
# STEP 3: Create ConfigMaps/Secrets imperatively (exam speed path)
# ============================================================================

# From literals:
kubectl -n weather-alert create configmap demo-config \
  --from-literal=FEATURE_FLAG=true \
  --from-literal=MAX_RETRIES=3 \
  --dry-run=client -o yaml

# Actually create it:
kubectl -n weather-alert create configmap demo-config \
  --from-literal=FEATURE_FLAG=true \
  --from-literal=MAX_RETRIES=3

# From a literal Secret:
kubectl -n weather-alert create secret generic demo-secret \
  --from-literal=API_TOKEN=s3cr3t-value \
  --dry-run=client -o yaml

kubectl -n weather-alert create secret generic demo-secret \
  --from-literal=API_TOKEN=s3cr3t-value

# Verify + decode:
kubectl -n weather-alert get secret demo-secret -o jsonpath='{.data.API_TOKEN}' | base64 -d
echo

# ============================================================================
# STEP 4: Reference manifest - env injection (what the app already uses)
# ============================================================================
# This is the actual pattern in weather-alert/k8s/deployments/user-service.yaml:
---
apiVersion: v1
kind: Pod
metadata:
  name: config-demo-env
  namespace: weather-alert
spec:
  containers:
  - name: demo
    image: busybox:musl
    command: ["sleep", "3600"]
    envFrom:
    - configMapRef:
        name: app-config        # every key becomes an env var
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: DB_PASSWORD      # only this one key, not the whole Secret
  restartPolicy: Never

# ============================================================================
# STEP 5: Reference manifest - volume-mounted config (alternative pattern)
# ============================================================================
# Contrast with mounting as files instead of env vars:
---
apiVersion: v1
kind: Pod
metadata:
  name: config-demo-volume
  namespace: weather-alert
spec:
  containers:
  - name: demo
    image: busybox:musl
    command: ["sleep", "3600"]
    volumeMounts:
    - name: config-vol
      mountPath: /etc/app-config    # each key becomes a FILE in this dir
    - name: secret-vol
      mountPath: /etc/app-secrets
      readOnly: true
  volumes:
  - name: config-vol
    configMap:
      name: app-config
  - name: secret-vol
    secret:
      secretName: app-secrets
  restartPolicy: Never

# Apply it (save the config-demo-volume manifest above to its own file first,
# e.g. config-demo-volume.yaml, then):
kubectl apply -f config-demo-volume.yaml

kubectl -n weather-alert exec config-demo-volume -- ls /etc/app-config
kubectl -n weather-alert exec config-demo-volume -- cat /etc/app-config/LOG_LEVEL
kubectl -n weather-alert exec config-demo-volume -- cat /etc/app-secrets/DB_PASSWORD

# ============================================================================
# STEP 6: Verification commands
# ============================================================================

# Confirm both demo objects exist:
kubectl -n weather-alert get configmap,secret | grep demo

# Confirm the real app Pods are still healthy after the rollout restart:
kubectl -n weather-alert get pods -l app=weather-fetcher
kubectl -n weather-alert get pods -l app=user-service

# ============================================================================
# CLEANUPx
# ============================================================================
kubectl -n weather-alert delete pod config-demo-env config-demo-volume --ignore-not-found
kubectl -n weather-alert delete configmap demo-config --ignore-not-found
kubectl -n weather-alert delete secret demo-secret --ignore-not-found

# Revert LOG_LEVEL back to info so the real project stays in its normal state:
kubectl -n weather-alert patch configmap app-config --type merge -p '{"data":{"LOG_LEVEL":"info"}}'
kubectl -n weather-alert rollout restart deployment/weather-fetcher

# ============================================================================
# KEY CONCEPTS FOR CKAD EXAM
# ============================================================================
#
# 1. INJECTION METHODS:
#    - envFrom.configMapRef / envFrom.secretRef  -> ALL keys become env vars
#    - env[].valueFrom.configMapKeyRef / secretKeyRef -> ONE key, custom env var name
#    - volumes[].configMap / volumes[].secret -> each key becomes a FILE
#
# 2. IMPERATIVE CREATION:
#    - kubectl create configmap <name> --from-literal=KEY=value
#    - kubectl create configmap <name> --from-file=path/to/file
#    - kubectl create secret generic <name> --from-literal=KEY=value
#    - kubectl create secret generic <name> --from-file=path/to/file
#
# 3. ENV VARS ARE A STARTUP-TIME SNAPSHOT:
#    - Editing ConfigMap/Secret does NOT change a running Pod's env
#    - Must `kubectl rollout restart deployment/<name>` to pick up changes
#    - Volume-mounted files DO update live (kubelet syncs periodically) but the
#      app must watch/re-read the file itself - nothing forces a reload
#
# 4. SECRETS ARE ENCODED, NOT ENCRYPTED (by default):
#    - `kubectl get secret -o yaml` shows base64 - decode with `base64 -d`
#    - Real encryption at rest requires cluster-level EncryptionConfiguration
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# If a Pod's env doesn't reflect a ConfigMap change:
# - This is expected! Env vars don't live-update. Restart the Deployment.
#
# If `kubectl exec ... printenv` shows nothing for a key:
# - Check the ConfigMap/Secret key name matches EXACTLY (case-sensitive)
# - Confirm the ConfigMap/Secret is in the SAME namespace as the Pod
#
# If a volume-mounted file is missing:
# - Check volumeMounts.mountPath matches volumes[].name correctly
# - `kubectl describe pod <name>` for mount errors in Events
#
# ============================================================================
# EXAM TIPS:
# - Use --dry-run=client -o yaml to preview ConfigMap/Secret before creating
# - envFrom is faster to write but harder to selectively override one key
# - Remember: rollout restart is required after ConfigMap/Secret edits for env-based injection
# - `kubectl get secret <name> -o jsonpath='{.data.KEY}' | base64 -d` is the fastest decode path
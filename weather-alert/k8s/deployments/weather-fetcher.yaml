apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-fetcher
  namespace: weather-alert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-fetcher
  template:
    metadata:
      labels:
        app: weather-fetcher
    spec:
      containers:
        - name: weather-fetcher
          image: weather-alert/weather-fetcher:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: weather-fetcher
  namespace: weather-alert
spec:
  selector:
    app: weather-fetcher
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
---
# weather-fetcher's own internal ticker (cmd/server/main.go) only auto-fetches
# a hardcoded list of 5 cities every 30 min. This one-off Job calls the same
# public API to fetch NEW data for cities outside that list, on demand -
# no app code change or redeploy needed.
apiVersion: batch/v1
kind: Job
metadata:
  name: weather-fetch-extra-cities
  namespace: weather-alert
spec:
  backoffLimit: 2
  template:
    spec:
      containers:
        - name: weather-fetch-extra-cities
          image: postgres:15-alpine   # already pulled for this project; ships a shell + wget
          command:
            - /bin/sh
            - -c
            - |
              for city in Berlin Singapore; do
                echo "Fetching weather for $city..."
                wget -qO- "http://weather-fetcher:8002/api/v1/weather/$city"
                echo
              done
      restartPolicy: Never
---
# CronJob version of the same task - keeps the extra (non-default) cities'
# Redis cache warm on its own schedule, independent of the app's built-in loop.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: weather-fetch-refresh
  namespace: weather-alert
spec:
  schedule: "*/5 * * * *"       # every 5 min for demo speed (real: match/complement the 30-min internal loop)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          containers:
            - name: weather-fetch-refresh
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  for city in Berlin Singapore; do
                    wget -qO- "http://weather-fetcher:8002/api/v1/weather/$city"
                    echo
                  done
          restartPolicy: OnFailure

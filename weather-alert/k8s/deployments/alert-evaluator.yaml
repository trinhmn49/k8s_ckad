apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-evaluator
  namespace: weather-alert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-evaluator
  template:
    metadata:
      labels:
        app: alert-evaluator
    spec:
      containers:
        - name: alert-evaluator
          image: weather-alert/alert-evaluator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          env:
            - name: PORT
              value: "8003"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alert-evaluator
  namespace: weather-alert
spec:
  selector:
    app: alert-evaluator
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP

# NOTE: This file uses stringData for readability in local/minikube dev only.
# Never commit real secrets to git. For production, use `kubectl create secret`
# imperatively, or a secrets manager (Vault, Sealed Secrets, External Secrets Operator).
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: weather-alert
type: Opaque
stringData:
  DB_USER: "weather_app"
  DB_PASSWORD: "weather_app"
  POSTGRES_USER: "weather_app"
  POSTGRES_PASSWORD: "weather_app"
  POSTGRES_DB: "weather_alert"
  APNS_KEY_ID: "XXXXXXXXXX"
  APNS_TEAM_ID: "XXXXXXXXXX"
  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_YOUR_BOTFATHER_TOKEN"
  TELEGRAM_CHAT_ID: "REPLACE_WITH_YOUR_CHAT_ID"

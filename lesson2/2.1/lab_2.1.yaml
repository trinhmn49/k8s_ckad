# Lab 2.1 — Rolling Update & Rollback
# Duration: ~45 min | CKAD domain: Application Deployment (20%)
# Perform a rolling update from v1 to v2
# Monitor rollout status
# Roll back after a simulated bad deployment
# Uses the real weather-alert/user-service Deployment - not a generic
# nginx/busybox placeholder

# ============================================================================
# PREREQUISITE
# ============================================================================
# This lab runs against the weather-alert project's user-service Deployment,
# already deployed to minikube under the "weather-alert" namespace:
#   kubectl apply -f ../../weather-alert/k8s/namespace.yaml
#   kubectl apply -f ../../weather-alert/k8s/configmaps/
#   kubectl apply -f ../../weather-alert/k8s/secrets/
#   kubectl apply -f ../../weather-alert/k8s/backing-services/
#   kubectl apply -f ../../weather-alert/k8s/deployments/
# Verify first:
#   kubectl -n weather-alert get deployment user-service
# Should show 2/2 READY, image weather-alert/user-service:latest.

# ============================================================================
# DETAILED EXPLANATION
# ============================================================================
#
# ROLLING UPDATE MECHANICS
#    - Any change to .spec.template (image, env, command, labels) creates a
#      NEW ReplicaSet - the Deployment controller scales it up while scaling
#      the old one down, gated by readinessProbe (zero-downtime by design)
#    - Default strategy: RollingUpdate (vs Recreate, which kills all Pods
#      first - simpler, but causes downtime)
#    - maxUnavailable / maxSurge control how aggressive the rollout is
#
# ROLLBACK MECHANICS
#    - Every revision is tracked (up to .spec.revisionHistoryLimit, default 10)
#    - `kubectl rollout undo` re-applies a PREVIOUS ReplicaSet's Pod template
#    - This creates a NEW revision - rollback does not "go back in time",
#      it is itself a forward rollout to an old template
#
# SIMULATING A "BAD DEPLOYMENT" WITHOUT BREAKING THE APP
#    - The realistic way to force a bad rollout in a local/exam environment:
#      deploy a tag that was never built (`imagePullPolicy: Never` + missing
#      tag -> ErrImageNeverPull). The Pod never becomes Ready, so the rollout
#      hangs exactly like a real bad release would - no need to actually
#      ship broken application code
#
# ============================================================================

# ============================================================================
# STEP 1: Tag the already-built image as v1 and v2
# ============================================================================
# Same real binary, two tags - this is enough to exercise genuine rolling-
# update mechanics, since Kubernetes diffs the image STRING in the Pod
# template, not the image content. From WSL, with `eval $(minikube docker-env)`
# active (so the tags land in minikube's own Docker daemon):

docker tag weather-alert/user-service:latest weather-alert/user-service:v1
docker tag weather-alert/user-service:latest weather-alert/user-service:v2

# ============================================================================
# STEP 2: Deploy v1, confirm baseline
# ============================================================================

kubectl -n weather-alert set image deployment/user-service user-service=weather-alert/user-service:v1
kubectl -n weather-alert rollout status deployment/user-service

kubectl -n weather-alert get deployment user-service \
  -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'

# ============================================================================
# STEP 3: Roll out v2, monitor rollout status
# ============================================================================

kubectl -n weather-alert set image deployment/user-service user-service=weather-alert/user-service:v2

# Watch the rollout - old and new Pods coexist briefly, gated by readiness:
kubectl -n weather-alert rollout status deployment/user-service

# In a second terminal while the above is running, watch Pods transition:
kubectl -n weather-alert get pods -l app=user-service -w

# Confirm a NEW ReplicaSet now exists (old one scaled to 0, kept for rollback):
kubectl -n weather-alert get replicaset -l app=user-service

kubectl -n weather-alert rollout history deployment/user-service

# ============================================================================
# STEP 4: Simulate a bad deployment (tag that was never built)
# ============================================================================

kubectl -n weather-alert set image deployment/user-service user-service=weather-alert/user-service:v3-broken

# Watch it hang - the new Pod can't start (imagePullPolicy: Never + missing tag):
kubectl -n weather-alert rollout status deployment/user-service --timeout=30s
# Expect: "Waiting for deployment ... rollout to finish" then a timeout -
# this IS the failure signal, not a script bug

kubectl -n weather-alert get pods -l app=user-service
# One new Pod stuck in ErrImageNeverPull / ImagePullBackOff

kubectl -n weather-alert describe pod -l app=user-service | grep -A3 Events:

# ============================================================================
# STEP 5: Roll back to the last known-good revision
# ============================================================================

kubectl -n weather-alert rollout undo deployment/user-service

kubectl -n weather-alert rollout status deployment/user-service

# Confirm the image is back to v2 (the last revision that actually worked):
kubectl -n weather-alert get deployment user-service \
  -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'

# Rollback itself created a NEW revision - it does not delete history:
kubectl -n weather-alert rollout history deployment/user-service

# ============================================================================
# STEP 6: Verification commands
# ============================================================================

# Confirm no Pods stuck in a bad state:
kubectl -n weather-alert get pods -l app=user-service

# Confirm the app actually works after all this churn:
kubectl -n weather-alert port-forward svc/user-service 8001:8001 &
curl http://localhost:8001/health

# ============================================================================
# CLEANUP
# ============================================================================
# Reset the image back to what's checked into
# weather-alert/k8s/deployments/user-service.yaml:
kubectl -n weather-alert set image deployment/user-service user-service=weather-alert/user-service:latest
kubectl -n weather-alert rollout status deployment/user-service

# ============================================================================
# KEY CONCEPTS FOR CKAD EXAM
# ============================================================================
#
# 1. ROLLOUT COMMANDS:
#    - kubectl set image deployment/<name> <container>=<image>  -> fastest way to trigger an update
#    - kubectl rollout status deployment/<name>                 -> watch current rollout
#    - kubectl rollout history deployment/<name>                -> list revisions
#    - kubectl rollout undo deployment/<name>                   -> back to previous revision
#    - kubectl rollout undo deployment/<name> --to-revision=N   -> back to a specific revision
#
# 2. WHAT MAKES A ROLLOUT "BAD":
#    - New Pods that never pass readinessProbe (bad image tag, crash on
#      startup, wrong config) block the rollout - old Pods stay up because
#      the Deployment won't scale them down until new ones are Ready
#    - This is exactly why a bad release doesn't cause a full outage by
#      default - it just gets stuck "in progress"
#
# 3. ROLLBACK IS ITSELF A ROLLOUT:
#    - `rollout undo` creates a NEW revision, respecting the same
#      maxSurge/maxUnavailable rules as any forward update
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# If rollout status never returns after set image ... v3-broken:
# - That's the expected failure - Ctrl+C the watch and move to Step 5 (undo)
#
# If `rollout undo` doesn't seem to change anything:
# - Confirm there IS a previous revision: kubectl rollout history deployment/user-service
# - If revisionHistoryLimit was too low, the old ReplicaSet may already be garbage collected
#
# If docker tag fails with "No such image":
# - Confirm you're pointed at minikube's Docker daemon: eval $(minikube docker-env)
# - Confirm the base image was actually built: docker images | grep user-service
#
# ============================================================================
# EXAM TIPS:
# - `kubectl set image` is faster than editing YAML for a single-container swap
# - Watch rollouts with `--watch`/`-w` or `rollout status` rather than polling `get pods`
# - A rollout that hangs at "x out of y new replicas updated" almost always
#   means the new Pods are failing readinessProbe - describe/logs the new Pod first
# - `rollout undo` is itself a rollout - it respects maxSurge/maxUnavailable
#   just like forward updates, so it can take a moment even to "go back"

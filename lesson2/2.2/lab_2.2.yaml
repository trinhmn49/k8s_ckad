# Lab 2.2 — Blue/Green Switch
# Duration: ~45 min | CKAD domain: Application Deployment (20%)
# Run two Deployments (blue and green)
# Route traffic via a single Service selector flip
# Uses the real weather-alert/user-service image, tagged as two color
# variants - not a generic nginx/busybox placeholder
#
# This lab creates its OWN standalone Deployments/Service, completely
# separate from the real user-service Deployment/Service - nothing here
# touches the actual running project.

# ============================================================================
# PREREQUISITE
# ============================================================================
# Requires the weather-alert namespace + backing services already deployed,
# and the user-service image already built into minikube's Docker daemon:
#   kubectl apply -f ../../weather-alert/k8s/namespace.yaml
#   kubectl apply -f ../../weather-alert/k8s/configmaps/
#   kubectl apply -f ../../weather-alert/k8s/secrets/
#   kubectl apply -f ../../weather-alert/k8s/backing-services/
# Verify: kubectl -n weather-alert get pods -l app=postgres

# ============================================================================
# DETAILED EXPLANATION
# ============================================================================
#
# BLUE/GREEN vs ROLLING UPDATE
#    - Rolling update (lab 2.1): ONE Deployment, old and new Pods coexist
#      briefly while traffic gradually shifts - gradual, same Service the
#      whole time
#    - Blue/Green: TWO separate Deployments running full-strength at once
#      (blue = current, green = candidate). Traffic cuts over INSTANTLY by
#      changing which Pods the Service selects - not gradual
#    - Rollback is instant too: flip the selector back, no rollout needed
#
# HOW THE CUTOVER ACTUALLY WORKS
#    - A Service's .spec.selector is just a label query - it doesn't care
#      which Deployment "owns" the Pods it matches
#    - Both blue and green Pods carry a SHARED label (app=user-service-
#      bluegreen) plus a DISTINGUISHING label (color=blue / color=green)
#    - The Service starts selecting {app=user-service-bluegreen, color=blue}
#    - Flipping color=blue -> color=green in the Service's selector re-
#      populates Endpoints immediately - no Pods are created, deleted, or
#      restarted by the flip itself
#
# TRADE-OFF vs ROLLING UPDATE:
#    - Blue/Green needs 2x the resources while both stacks are up
#    - But rollback is instant (selector flip) vs rolling back through
#      readiness-gated Pod churn
#
# ============================================================================

# ============================================================================
# STEP 1: Tag the real image as two color variants
# ============================================================================
# Same real binary, two tags - enough to prove the cutover mechanics.
# From WSL, with `eval $(minikube docker-env)` active:

docker tag weather-alert/user-service:latest weather-alert/user-service:blue
docker tag weather-alert/user-service:latest weather-alert/user-service:green

# ============================================================================
# STEP 2: Deploy BOTH color variants at once
# ============================================================================

kubectl -n weather-alert apply -f - <<'EOF'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-blue
  namespace: weather-alert
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service-bluegreen
      color: blue
  template:
    metadata:
      labels:
        app: user-service-bluegreen
        color: blue
    spec:
      containers:
      - name: user-service
        image: weather-alert/user-service:blue
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        - name: DEPLOY_COLOR
          value: blue
        - name: DB_USER
          valueFrom:
            secretKeyRef: {name: app-secrets, key: DB_USER}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: {name: app-secrets, key: DB_PASSWORD}
        envFrom:
        - configMapRef: {name: app-config}
        readinessProbe:
          httpGet: {path: /health, port: 8001}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-green
  namespace: weather-alert
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service-bluegreen
      color: green
  template:
    metadata:
      labels:
        app: user-service-bluegreen
        color: green
    spec:
      containers:
      - name: user-service
        image: weather-alert/user-service:green
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        - name: DEPLOY_COLOR
          value: green
        - name: DB_USER
          valueFrom:
            secretKeyRef: {name: app-secrets, key: DB_USER}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: {name: app-secrets, key: DB_PASSWORD}
        envFrom:
        - configMapRef: {name: app-config}
        readinessProbe:
          httpGet: {path: /health, port: 8001}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-bluegreen-router
  namespace: weather-alert
spec:
  selector:
    app: user-service-bluegreen
    color: blue   # starts pointed at blue
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
EOF

kubectl -n weather-alert rollout status deployment/user-service-blue
kubectl -n weather-alert rollout status deployment/user-service-green

# ============================================================================
# STEP 3: Confirm the router currently serves BLUE only
# ============================================================================

kubectl -n weather-alert get endpoints user-service-bluegreen-router
# IPs shown should match ONLY the blue Pods:
kubectl -n weather-alert get pods -l app=user-service-bluegreen,color=blue -o wide

kubectl -n weather-alert port-forward svc/user-service-bluegreen-router 18001:8001 &
curl http://localhost:18001/health
kill %1   # stop the port-forward job

# ============================================================================
# STEP 4: Cut traffic over to GREEN with a single selector flip
# ============================================================================

kubectl -n weather-alert patch service user-service-bluegreen-router \
  --type merge \
  -p '{"spec":{"selector":{"app":"user-service-bluegreen","color":"green"}}}'

# Endpoints repopulate INSTANTLY - no Pods were created/deleted/restarted:
kubectl -n weather-alert get endpoints user-service-bluegreen-router
kubectl -n weather-alert get pods -l app=user-service-bluegreen,color=green -o wide

kubectl -n weather-alert port-forward svc/user-service-bluegreen-router 18001:8001 &
curl http://localhost:18001/health
kill %1

# ============================================================================
# STEP 5: Instant rollback - flip the selector back to blue
# ============================================================================

kubectl -n weather-alert patch service user-service-bluegreen-router \
  --type merge \
  -p '{"spec":{"selector":{"app":"user-service-bluegreen","color":"blue"}}}'

kubectl -n weather-alert get endpoints user-service-bluegreen-router
# No rollout, no Pod churn - traffic is back on blue immediately

# ============================================================================
# STEP 6: Verification commands
# ============================================================================

# Confirm the Service selector's current color:
kubectl -n weather-alert get service user-service-bluegreen-router \
  -o jsonpath='{.spec.selector.color}{"\n"}'

# Confirm both stacks are still fully up regardless of which one is "live":
kubectl -n weather-alert get deployment user-service-blue user-service-green

# Confirm the REAL user-service Deployment/Service were never touched:
kubectl -n weather-alert get deployment user-service -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
kubectl -n weather-alert get service user-service -o jsonpath='{.spec.selector}{"\n"}'

# ============================================================================
# CLEANUP
# ============================================================================
kubectl -n weather-alert delete deployment user-service-blue user-service-green --ignore-not-found
kubectl -n weather-alert delete service user-service-bluegreen-router --ignore-not-found

# ============================================================================
# KEY CONCEPTS FOR CKAD EXAM
# ============================================================================
#
# 1. A SERVICE IS JUST A LABEL SELECTOR + STABLE VIRTUAL IP:
#    - It has no idea which Deployment "owns" the Pods it routes to
#    - Changing .spec.selector is a Service edit, NOT a Deployment/Pod change
#
# 2. BLUE/GREEN CUTOVER = ZERO POD CHURN:
#    - kubectl patch service ... -p '{"spec":{"selector":{...}}}' is instant
#    - Compare to a rolling update, where Pods are created/terminated over time
#
# 3. SHARED + DISTINGUISHING LABELS:
#    - Both color variants share app=user-service-bluegreen (what humans query)
#    - color=blue/green is what the Service's selector actually flips on
#
# 4. TWO FULL DEPLOYMENTS RUNNING AT ONCE = 2x RESOURCE COST:
#    - This is the real trade-off vs a rolling update - budget for it
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# If curl returns nothing after the selector flip:
# - Confirm the target color's Pods are actually Ready:
#   kubectl -n weather-alert get pods -l app=user-service-bluegreen,color=green
# - kubectl -n weather-alert get endpoints user-service-bluegreen-router
#   should list their IPs - empty Endpoints means no Ready Pods match yet
#
# If both curls (blue and green) return the same thing:
# - Expected here - blue and green run the SAME real binary/tag content in
#   this lab (only the color label/env var differs), to isolate the
#   Service-selector mechanic from needing two genuinely different app builds
#
# ============================================================================
# EXAM TIPS:
# - `kubectl patch service <name> --type merge -p '{"spec":{"selector":{...}}}'`
#   is the fastest imperative way to flip a Service's target
# - There is no `kubectl set selector` subcommand - patch or edit are the options
# - Endpoints updates are near-instant once you patch the selector - no
#   readiness-gated rollout like a Deployment update
# - Keep both Deployments' replica counts equal to actual traffic needs -
#   blue/green doubles your resource footprint for as long as both are live
